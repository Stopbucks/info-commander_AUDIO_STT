
#----------------------------------------
# 每天僅在 UTC 21:32 (台灣時間清晨 05:32) 執行一次「夜間掃蕩」
# .github/workflows/audio_stt.yml (V1.2 一條龍強化版) 
#----------------------------------------
name: AUDIO_STT (Heavy Lifter)

on:
  schedule:
    # 每天執行一次夜間掃蕩
    - cron: '32 21 * * *'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  heavy_stt_mission:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Packages (Uniform Armor)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute GHA_AudioSTT Heavy Mission
        env:
          # --- 基礎通訊密碼 ---
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          
          # --- AI 火力密碼 ---
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # --- Telegram 戰報密碼 ---
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # --- 身分與環境配置 ---
          WORKER_ID: "GHA_AudioSTT"
          PYTHONPATH: .
        run: python src/gha_audio_stt.py
